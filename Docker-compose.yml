version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: local-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: postgres
    ports:
      - "5436:5432"
    volumes:
      - local-postgres_data:/var/lib/postgresql/data

volumes:
  local-postgres_data: